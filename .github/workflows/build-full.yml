on:
  push:
    branches:
    - "main"
  pull_request:
    branches:
    - "*"

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        nimversion:
          - '2.2.10'
        os:
          - macos-latest
          # - ubuntu-latest
          # - windows-2022
    steps:
    - uses: actions/checkout@v5

    - name: Cache packages
      uses: actions/cache@v4
      with:
        path: deps/
        key: ${{ runner.os }}-nim${{ matrix.nimversion }}-${{ hashFiles('merenda.nimble', 'nim.cfg') }}

    - name: Install GrabNim
      if: runner.os != 'Windows'
      run: |
        curl -fsSL https://codeberg.org/janAkali/grabnim/raw/branch/master/misc/install.sh | sh
        echo "$HOME/.local/share/grabnim/current/bin" >> $GITHUB_PATH
        echo "$HOME/.nimble/bin" >> $GITHUB_PATH
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Install Nim
      if: runner.os != 'Windows'
      run: |
        grabnim ${{ matrix.nimversion }}
        nim -v

    - name: Install Nim (Windows)
      if: runner.os == 'Windows'
      uses: jiro4989/setup-nim-action@v2
      with:
        nim-version: ${{ matrix.nimversion }}

    - name: Install Atlas
      run: |
        mkdir -p "$HOME/.local/bin"
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        curl -fsSL https://raw.githubusercontent.com/nim-lang/atlas/HEAD/install.sh | \
          ATLAS_INSTALL_DIR="$HOME/.local/bin" bash -
        echo "Nim:: "
        nim -v
        echo "Atlas:: "
        atlas -v

    - name: Install Deps
      run: |
        # sync deps
        atlas -t --update install

    - name: Clean generated examples
      run: |
        find examples -maxdepth 1 -type f \
          ! -name '*.nim' \
          ! -name '*.nims' \
          -delete

    - name: Build Tests
      run: |
        atlas-run tests --only-errors

    - name: Build Examples
      run: |
        atlas-run tests --compile-only "examples/*.nim" --only-errors

