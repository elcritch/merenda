on:
  push:
    branches:
    - "main"
  pull_request:
    branches:
    - "*"

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        nimversion:
          - '2.2.10'
        os:
          - macos-latest
          - ubuntu-latest
          # - windows-2022
        display:
          - none
        exclude:
          - os: ubuntu-latest
            display: none
        include:
          - os: ubuntu-24.04
            display: x11
          # - os: ubuntu-24.04
          #   display: wayland
    steps:
    - uses: actions/checkout@v5

    - name: Cache packages
      uses: actions/cache@v4
      with:
        path: deps/
        key: ${{ runner.os }}-nim${{ matrix.nimversion }}-${{ hashFiles('merenda.nimble', 'nim.cfg') }}

    - name: Install GrabNim
      if: runner.os != 'Windows'
      run: |
        curl -fsSL https://codeberg.org/janAkali/grabnim/raw/branch/master/misc/install.sh | sh
        echo "$HOME/.local/share/grabnim/current/bin" >> $GITHUB_PATH
        echo "$HOME/.nimble/bin" >> $GITHUB_PATH
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Install Nim
      if: runner.os != 'Windows'
      run: |
        grabnim ${{ matrix.nimversion }}
        nim -v

    - name: Install Nim (Windows)
      if: runner.os == 'Windows'
      uses: jiro4989/setup-nim-action@v2
      with:
        nim-version: ${{ matrix.nimversion }}

    - name: Setup software OpenGL/Vulkan (Mesa) + Xvfb (X11)
      if: runner.os == 'Linux' && matrix.display == 'x11'
      timeout-minutes: 15
      run: |
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
          xvfb \
          libx11-xcb-dev \
          libxcb1-dev \
          libxcursor-dev \
          libxkbcommon-dev \
          libxrender-dev \
          libgl1-mesa-dev \
          libgles2-mesa-dev \
          libegl1-mesa-dev \
          mesa-utils \
          vulkan-tools \
          mesa-vulkan-drivers \
          libvulkan1 \
          libgl1-mesa-dri \
          libglx-mesa0 \
          libegl-mesa0 \
          libgles2

    - name: Install Atlas
      run: |
        mkdir -p "$HOME/.local/bin"
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        curl -fsSL https://raw.githubusercontent.com/nim-lang/atlas/HEAD/install.sh | \
          ATLAS_INSTALL_DIR="$HOME/.local/bin" bash -
        echo "Nim:: "
        nim -v
        echo "Atlas:: "
        atlas -v

    - name: Install Deps
      run: |
        # sync deps
        atlas -t --update install

    - name: Clean generated examples
      run: |
        find examples -maxdepth 1 -type f \
          ! -name '*.nim' \
          ! -name '*.nims' \
          -delete

    - name: Build Tests
      run: |
        atlas-run tests --jobs:2 --only-errors

    - name: Build Integration Tests
      if: runner.os == 'macOS'
      run: |
        atlas-run tests --jobs:2 --only-errors "tests/integration*.nim"

  examples:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        nimversion:
          - '2.2.10'
        os:
          - macos-latest
          - ubuntu-latest
          - windows-2022
    steps:
    - uses: actions/checkout@v5

    - name: Cache packages
      uses: actions/cache@v4
      with:
        path: deps/
        key: ${{ runner.os }}-nim${{ matrix.nimversion }}-${{ hashFiles('merenda.nimble', 'nim.cfg') }}

    - name: Install GrabNim
      if: runner.os != 'Windows'
      run: |
        curl -fsSL https://codeberg.org/janAkali/grabnim/raw/branch/master/misc/install.sh | sh
        echo "$HOME/.local/share/grabnim/current/bin" >> $GITHUB_PATH
        echo "$HOME/.nimble/bin" >> $GITHUB_PATH
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Install Nim
      if: runner.os != 'Windows'
      run: |
        grabnim ${{ matrix.nimversion }}
        nim -v

    - name: Install Nim (Windows)
      if: runner.os == 'Windows'
      uses: jiro4989/setup-nim-action@v2
      with:
        nim-version: ${{ matrix.nimversion }}

    - name: Install Atlas
      run: |
        mkdir -p "$HOME/.local/bin"
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        curl -fsSL https://raw.githubusercontent.com/nim-lang/atlas/HEAD/install.sh | \
          ATLAS_INSTALL_DIR="$HOME/.local/bin" bash -
        echo "Nim:: "
        nim -v
        echo "Atlas:: "
        atlas -v

    - name: Install Deps
      run: |
        # sync deps
        atlas -t --update install

    - name: Clean generated examples
      run: |
        find examples -maxdepth 1 -type f \
          ! -name '*.nim' \
          ! -name '*.nims' \
          -delete

    - name: Compile Examples
      run: |
        atlas-run tests --jobs:2 --compile-only --only-errors "examples/*.nim"
